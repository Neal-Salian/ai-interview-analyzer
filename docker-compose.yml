services:
  db:
    image: postgres:15
    container_name: interview_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    container_name: nginx_rtmp
    restart: always
    ports:
      - "1935:1935" # The standard RTMP port Zoom will broadcast to

volumes:
  postgres_data:
